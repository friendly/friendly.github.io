project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!index.Rmd"
    - "!packages.Rmd"
    - "!dev/*"
    - "!*.md"
    - "!README*"
    - "!QUARTO*"
    - "!*-old.qmd"
  resources:
    - "images/"

execute:
  freeze: auto

website:
  title: "Michael Friendly"
  description: "Data Visualization Research, R Packages, and Teaching"
  favicon: images/MF-face.png

  navbar:
    background: primary
    search: false
    left:
      - text: "Home"
        href: index.qmd
      - text: "R Packages"
        href: packages.qmd
      - text: "Books"
        href: books.qmd
      - text: "Courses"
        href: courses.qmd
      - text: "Other Software"
        href: software.qmd
    right:
      - icon: github
        href: https://github.com/friendly
        aria-label: GitHub
      - text: <img src="images/bluesky-logo.png" style="height:1.2em; vertical-align:middle;">
        href: https://bsky.app/profile/datavisfriendly.bsky.social
        aria-label: BlueSky

  page-footer:
    left: "Copyright 2025, Michael Friendly"
    right:
      - text: "friendly.github.io/"
        href: https://friendly.github.io/

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: false
    page-layout: full
